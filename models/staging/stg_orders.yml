version: 2

models:
  - name: stg_orders
    description: "Staging model for orders"
    columns:
      - name: order_key
        description: "Unique identifier for the order"
        tests:
          - unique
          - not_null

      - name: customer_key
        description: "Customer foreign key"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_key

      - name: status_code
        description: "Order status code"
