version: 2

models:
  - name: stg_orders
    description: "Staging model for orders"
    columns:
      - name: order_key
        description: "Primary key"
        tests:
          - unique
          - not_null

      - name: customer_key
        description: "Foreign key to customers"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_key

